name: Filmarks → Sheets 自動同期

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 JST 06:00 (UTC 21:00)
  workflow_dispatch:         # GitHub画面から手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリをインストール
        run: pip install requests beautifulsoup4 google-auth google-auth-httplib2 google-api-python-client

      - name: Filmarks → Sheets 同期実行
        run: python sync_filmarks.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
