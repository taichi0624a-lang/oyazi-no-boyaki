name: Filmarks 自動同期

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 JST 06:00 (UTC 21:00)
  workflow_dispatch:         # GitHub画面から手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # movies_watched.json をコミットするために必要

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリをインストール
        run: pip install requests beautifulsoup4

      - name: Filmarks → movies_watched.json 同期
        run: python sync_filmarks.py

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add movies_watched.json
          git diff --cached --quiet && echo "変更なし" || (git commit -m "自動同期: movies_watched.json を更新" && git push)
