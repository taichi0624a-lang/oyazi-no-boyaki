<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>LEDGER — 台帳</title>
<!-- PWA / ホーム画面に追加 -->
<link rel="manifest" href="okane.webmanifest">
<meta name="theme-color" content="#aa1414">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="台帳">
<!-- ダークモードのちらつき防止 -->
<script>if(localStorage.getItem('ozi-theme')==='dark')document.documentElement.classList.add('dark-mode')</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

:root {
    --bg:    #f5f2ec;
    --paper: #faf9f5;
    --ink:   #0e0d0c;
    --red:   #aa1414;
    --rule:  #ddd8ce;
    --dim:   #918d86;
    --warm:  #eae5dc;
}
body.dark-mode, html.dark-mode body {
    --bg:    #111009;
    --paper: #1a1815;
    --ink:   #ede8df;
    --red:   #cc2828;
    --rule:  #2e2b25;
    --dim:   #7a756e;
    --warm:  #1e1c18;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
a, button { -webkit-tap-highlight-color:transparent; }

body {
    background:var(--bg);
    color:var(--ink);
    font-family:'DM Sans', sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    padding-bottom:60px;
}

/* ── MASTHEAD ── */
#masthead { position:sticky; top:0; z-index:500; background:var(--bg); }
.mh-top {
    padding:16px 6vw 14px;
    border-bottom:1px solid var(--ink);
    display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.mh-brand {
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(1rem, 2vw, 1.6rem);
    font-weight:500; color:var(--ink);
    letter-spacing:-0.015em; text-decoration:none; line-height:1.2; white-space:nowrap;
}
.mh-brand em { font-style:italic; color:var(--red); font-weight:400; }
.mh-btn {
    background:transparent; border:1px solid var(--rule); color:var(--dim);
    font-family:'Space Mono', monospace; font-size:11px; letter-spacing:2px;
    padding:8px 14px; cursor:pointer; line-height:1;
    transition:border-color .18s, color .18s;
}
.mh-btn:hover { border-color:var(--ink); color:var(--ink); }
.mh-dateline {
    padding:5px 6vw; border-bottom:1px solid var(--rule);
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Space Mono', monospace; font-size:9px; letter-spacing:1.5px; color:var(--dim);
}

#wrap { max-width:900px; margin:0 auto; padding:0 6vw; }

/* ── SECTION RULE ── */
.sec-rule { display:flex; align-items:center; gap:16px; padding:34px 0 18px; }
.sec-rule-lbl {
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:.9rem; letter-spacing:.04em; color:var(--ink); flex-shrink:0;
}
.sec-rule-line { flex:1; height:1px; background:var(--red); opacity:.35; }
.sec-rule-cnt { font-family:'Space Mono', monospace; font-size:8px; color:var(--dim); flex-shrink:0; }

/* ── HERO: 今月のムダ遣い ── */
#hero {
    text-align:center; padding:44px 20px 40px;
    border-bottom:1px solid var(--rule);
    background:var(--paper);
}
.hero-lbl {
    font-family:'Space Mono', monospace; font-size:9px; letter-spacing:5px;
    color:var(--dim); margin-bottom:14px;
}
#hero-total {
    font-family:'Playfair Display', serif; font-weight:700;
    font-size:clamp(3.2rem, 15vw, 6rem); line-height:.95;
    color:var(--red); letter-spacing:-.02em;
    transition:color .4s;
}
#hero-month { font-family:'Cormorant Garamond', serif; font-style:italic; font-size:1rem; color:var(--dim); margin-top:6px; }
#hero-pace {
    margin-top:22px; display:inline-block;
    font-family:'Space Mono', monospace; font-size:11px; letter-spacing:2px;
    color:var(--ink); border:1px solid var(--rule); padding:9px 16px;
}
#hero-pace b { color:var(--red); }
#hero-streak {
    margin-top:12px; font-family:'Space Mono', monospace; font-size:9px;
    letter-spacing:2px; color:var(--dim);
}
#hero-streak b { color:var(--ink); }

/* ── QUICK LOG ── */
.cat-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:16px; }
.cat-btn {
    background:var(--paper); border:1px solid var(--rule); color:var(--ink);
    font-family:'DM Sans', sans-serif; font-size:14px; font-weight:500;
    padding:16px 8px; cursor:pointer; min-height:56px;
    display:flex; flex-direction:column; align-items:center; gap:5px;
    transition:border-color .15s, background .15s, transform .1s;
}
.cat-btn .cat-emoji { font-size:20px; line-height:1; }
.cat-btn:hover { border-color:var(--ink); background:var(--warm); }
.cat-btn.active { border-color:var(--red); background:rgba(170,20,20,.05); color:var(--red); }
.cat-btn:active { transform:scale(.97); }

.log-panel {
    border:1px solid var(--rule); background:var(--paper);
    padding:20px; margin-bottom:8px; display:none;
}
.log-panel.open { display:block; }
.log-panel-cat {
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:1.3rem;
    color:var(--ink); margin-bottom:16px;
}
.log-panel-cat b { color:var(--red); }
.amt-presets { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.amt-preset {
    background:transparent; border:1px solid var(--rule); color:var(--dim);
    font-family:'Space Mono', monospace; font-size:12px; letter-spacing:1px;
    padding:9px 13px; cursor:pointer; min-height:40px; transition:.15s;
}
.amt-preset:hover, .amt-preset.active { border-color:var(--red); color:var(--red); }
.log-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.amt-input {
    flex:1 1 130px; background:var(--bg); border:1px solid var(--rule); color:var(--ink);
    font-family:'Playfair Display', serif; font-size:1.6rem; font-weight:700;
    padding:8px 14px; outline:none; transition:border-color .18s;
}
.amt-input:focus { border-color:var(--red); }
.memo-input {
    flex:2 1 180px; background:var(--bg); border:1px solid var(--rule); color:var(--ink);
    font-family:'DM Sans', sans-serif; font-size:14px; padding:8px 14px; outline:none;
    transition:border-color .18s;
}
.memo-input:focus { border-color:var(--ink); }

/* ── 必要 / ムダ トグル ── */
.need-toggle { display:flex; gap:0; margin-bottom:16px; border:1px solid var(--rule); }
.need-opt {
    flex:1; background:transparent; border:none; cursor:pointer;
    font-family:'Space Mono', monospace; font-size:11px; letter-spacing:2px;
    color:var(--dim); padding:12px; min-height:44px; transition:.15s;
    border-right:1px solid var(--rule);
}
.need-opt:last-child { border-right:none; }
.need-opt.sel-need { background:var(--warm); color:var(--ink); }
.need-opt.sel-waste { background:var(--red); color:#fff; }
.need-hint { font-size:11px; color:var(--dim); margin-bottom:16px; line-height:1.6; }

.log-acts { display:flex; gap:8px; justify-content:flex-end; }
.log-cancel {
    background:transparent; border:1px solid var(--rule); color:var(--dim);
    font-family:'Space Mono', monospace; font-size:10px; letter-spacing:2px;
    padding:11px 18px; cursor:pointer; min-height:44px; transition:.15s;
}
.log-cancel:hover { border-color:var(--ink); color:var(--ink); }
.log-save {
    background:var(--red); border:none; color:#fff;
    font-family:'Space Mono', monospace; font-weight:700; font-size:10px; letter-spacing:3px;
    padding:11px 26px; cursor:pointer; min-height:44px; transition:opacity .15s;
}
.log-save:hover { opacity:.85; }
.log-save:disabled { opacity:.35; cursor:not-allowed; }

/* ── 見える化 ── */
.viz-block { margin-bottom:6px; }
.conv-list { display:grid; gap:10px; }
.conv-item {
    display:flex; align-items:baseline; gap:12px;
    padding:14px 16px; border:1px solid var(--rule); background:var(--paper);
}
.conv-emoji { font-size:22px; line-height:1; }
.conv-num {
    font-family:'Playfair Display', serif; font-weight:700; font-size:1.6rem; color:var(--red);
    flex-shrink:0;
}
.conv-txt { font-family:'Cormorant Garamond', serif; font-style:italic; font-size:1.1rem; color:var(--ink); }
.conv-empty, .list-empty, .bars-empty {
    font-family:'Space Mono', monospace; font-size:10px; letter-spacing:2px;
    color:var(--dim); padding:20px 4px; text-align:center;
}

/* category breakdown */
.cat-bars { display:grid; gap:10px; }
.cat-bar-row { }
.cat-bar-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.cat-bar-name { font-family:'DM Sans', sans-serif; font-size:13px; color:var(--ink); }
.cat-bar-val { font-family:'Space Mono', monospace; font-size:11px; color:var(--dim); }
.cat-bar-track { height:8px; background:var(--warm); overflow:hidden; }
.cat-bar-fill { height:100%; background:var(--red); transition:width .5s cubic-bezier(.16,1,.3,1); }

/* daily bar chart */
.chart {
    display:flex; align-items:flex-end; gap:4px; height:140px;
    padding:14px 4px 0; border-bottom:1px solid var(--rule);
}
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end; }
.chart-bar {
    width:100%; max-width:26px; background:var(--red); opacity:.75;
    border-radius:1px 1px 0 0; min-height:2px; transition:height .5s cubic-bezier(.16,1,.3,1);
}
.chart-bar.zero { background:var(--rule); opacity:.5; }
.chart-day { font-family:'Space Mono', monospace; font-size:8px; color:var(--dim); }

/* ── LOG LIST ── */
.month-nav { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.month-nav button {
    background:transparent; border:1px solid var(--rule); color:var(--dim);
    font-family:'Space Mono', monospace; font-size:12px; padding:6px 12px;
    cursor:pointer; min-height:38px; min-width:38px; transition:.15s;
}
.month-nav button:hover:not(:disabled) { border-color:var(--ink); color:var(--ink); }
.month-nav button:disabled { opacity:.3; cursor:not-allowed; }
.month-nav-label { font-family:'Cormorant Garamond', serif; font-style:italic; font-size:1.1rem; color:var(--ink); flex:1; text-align:center; }

.log-item {
    display:flex; align-items:center; gap:12px;
    padding:14px 4px; border-bottom:1px solid var(--rule);
}
.log-item:first-child { border-top:1px solid var(--rule); }
.log-item-cat {
    font-family:'Space Mono', monospace; font-size:8px; letter-spacing:1px;
    color:var(--dim); border:1px solid var(--rule); padding:3px 7px; flex-shrink:0;
    min-width:66px; text-align:center;
}
.log-item-cat.waste { color:var(--red); border-color:rgba(170,20,20,.3); }
.log-item-main { flex:1; min-width:0; }
.log-item-memo { font-family:'DM Sans', sans-serif; font-size:14px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.log-item-date { font-family:'Space Mono', monospace; font-size:8px; color:var(--dim); letter-spacing:1px; margin-top:3px; }
.log-item-amt { font-family:'Playfair Display', serif; font-weight:700; font-size:1.15rem; color:var(--ink); flex-shrink:0; }
.log-item-amt.waste { color:var(--red); }
.log-item-del {
    flex-shrink:0; background:transparent; border:1px solid rgba(170,20,20,.15);
    color:rgba(170,20,20,.4); font-size:13px; line-height:1; padding:8px 10px;
    cursor:pointer; min-height:40px; transition:.15s;
}
.log-item-del:hover { border-color:var(--red); color:var(--red); }

/* ── FOOTER ── */
#foot {
    border-top:1px solid var(--ink); margin:48px 0 20px; padding:18px 0;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
}
.foot-brand { font-family:'Cormorant Garamond', serif; font-style:italic; font-size:.95rem; color:var(--ink); }
.foot-tools { display:flex; gap:8px; }
.foot-tools button {
    background:transparent; border:1px solid var(--rule); color:var(--dim);
    font-family:'Space Mono', monospace; font-size:8px; letter-spacing:2px;
    padding:6px 10px; cursor:pointer; transition:.15s;
}
.foot-tools button:hover { border-color:var(--ink); color:var(--ink); }

/* ── TOAST ── */
#toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(8px);
    background:var(--ink); color:var(--bg);
    font-family:'Space Mono', monospace; font-size:10px; letter-spacing:3px;
    padding:11px 20px; z-index:9999; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; text-align:center; max-width:90vw;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (max-width:640px) {
    #wrap { padding:0 5vw; }
    .mh-top { padding:12px 5vw 10px; }
    .cat-grid { grid-template-columns:repeat(2, 1fr); }
    .amt-input { font-size:1.4rem; }
}
</style>
</head>
<body>

<!-- ══════ MASTHEAD ══════ -->
<header id="masthead">
    <div class="mh-top">
        <span class="mh-brand" id="brand"><em>台帳</em> — LEDGER</span>
        <button class="mh-btn" onclick="toggleTheme()">◐</button>
    </div>
    <div class="mh-dateline">
        <span id="today-str">—</span>
        <span>PRIVATE · 浪費記録</span>
    </div>
</header>

<!-- ══════ HERO ══════ -->
<section id="hero">
    <div class="hero-lbl">今月のムダ遣い</div>
    <div id="hero-total">¥0</div>
    <div id="hero-month">—</div>
    <div id="hero-pace">このペースだと 年間 <b id="pace-val">¥0</b></div>
    <div id="hero-streak"></div>
</section>

<div id="wrap">

    <!-- ══════ QUICK LOG ══════ -->
    <section>
        <div class="sec-rule">
            <span class="sec-rule-lbl">記録する</span>
            <div class="sec-rule-line"></div>
            <span class="sec-rule-cnt">QUICK LOG</span>
        </div>
        <div class="cat-grid" id="cat-grid"></div>
        <div class="log-panel" id="log-panel">
            <div class="log-panel-cat">カテゴリ: <b id="lp-cat">—</b></div>
            <div class="amt-presets" id="amt-presets"></div>
            <div class="log-row">
                <input class="amt-input" id="amt-input" type="number" inputmode="numeric" placeholder="¥ 金額" min="0">
                <input class="memo-input" id="memo-input" type="text" placeholder="何を買った？（任意）" autocomplete="off">
            </div>
            <div class="need-toggle">
                <button class="need-opt" id="need-btn" onclick="setNeed(false)">これは必要だった</button>
                <button class="need-opt sel-waste" id="waste-btn" onclick="setNeed(true)">これはムダだった</button>
            </div>
            <div class="need-hint" id="need-hint">「ムダ」に入れた分だけが上の合計に積み上がる。記録する前に一呼吸、本当に必要だったか自分に聞いてみて。</div>
            <div class="log-acts">
                <button class="log-cancel" onclick="closeLog()">やめる</button>
                <button class="log-save" id="log-save" onclick="saveLog()">記録する →</button>
            </div>
        </div>
    </section>

    <!-- ══════ 換算 ══════ -->
    <section class="viz-block">
        <div class="sec-rule">
            <span class="sec-rule-lbl">このムダで、何が買えた？</span>
            <div class="sec-rule-line"></div>
            <span class="sec-rule-cnt" id="conv-sub">—</span>
        </div>
        <div class="conv-list" id="conv-list"></div>
    </section>

    <!-- ══════ カテゴリ内訳 ══════ -->
    <section class="viz-block">
        <div class="sec-rule">
            <span class="sec-rule-lbl">どこが穴か</span>
            <div class="sec-rule-line"></div>
            <span class="sec-rule-cnt">BY CATEGORY</span>
        </div>
        <div class="cat-bars" id="cat-bars"></div>
    </section>

    <!-- ══════ 日別グラフ ══════ -->
    <section class="viz-block">
        <div class="sec-rule">
            <span class="sec-rule-lbl">直近14日</span>
            <div class="sec-rule-line"></div>
            <span class="sec-rule-cnt">DAILY</span>
        </div>
        <div class="chart" id="chart"></div>
    </section>

    <!-- ══════ 記録一覧 ══════ -->
    <section class="viz-block">
        <div class="sec-rule">
            <span class="sec-rule-lbl">記録一覧</span>
            <div class="sec-rule-line"></div>
            <span class="sec-rule-cnt" id="list-cnt">—</span>
        </div>
        <div class="month-nav">
            <button id="mn-prev" onclick="shiftMonth(-1)">‹</button>
            <span class="month-nav-label" id="mn-label">—</span>
            <button id="mn-next" onclick="shiftMonth(1)">›</button>
        </div>
        <div id="log-list"></div>
    </section>

    <!-- ══════ FOOTER ══════ -->
    <footer id="foot">
        <span class="foot-brand">記録は、いちばん静かな抑止力。</span>
        <div class="foot-tools">
            <button onclick="exportData()">EXPORT</button>
            <button onclick="importData()">IMPORT</button>
        </div>
    </footer>

</div>

<div id="toast"></div>
<input type="file" id="import-file" accept="application/json" style="display:none">

<script>
/* ════════════════════════════════════════════
   設定（ここだけ書き換えれば調整できる）
   ════════════════════════════════════════════ */
const APP_NAME = "台帳";                     // ← 正式名が決まったらここを変える
const STORE_KEY = "saifu-log-v1";

// カテゴリ（絵文字はお好みで）
const CATEGORIES = [
    { name: "コンビニ",   emoji: "🏪" },
    { name: "自販機",     emoji: "🥤" },
    { name: "衝動買い",   emoji: "🛒" },
    { name: "ストレス",   emoji: "🌀" },
    { name: "外食・カフェ", emoji: "☕" },
    { name: "その他",     emoji: "•"  },
];

// 金額クイックプリセット
const AMT_PRESETS = [150, 300, 500, 1000, 3000];

// 「何が買えた」換算の単価（円）。実感の湧くものに自由に変えてOK
const CONVERSIONS = [
    { emoji:"📚", unit:1650, label:"冊", name:"本" },
    { emoji:"🎬", unit:1000, label:"ヶ月", name:"サブスク" },
    { emoji:"🍚", unit:1200, label:"回", name:"ちょっといい外食" },
    { emoji:"🎫", unit:2000, label:"回", name:"映画館" },
];

/* ════════════════════════════════════════════ */
let LOG = [];
let viewYM = null;          // 一覧の表示月 {y, m}
let sel = { cat:null, need:true, amt:null };

function load() {
    try { LOG = JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch(e) { LOG = []; }
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(LOG)); }

const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");

function ymOf(ts) { const d = new Date(ts); return { y:d.getFullYear(), m:d.getMonth() }; }
function sameYM(ts, ym) { const o = ymOf(ts); return o.y===ym.y && o.m===ym.m; }

/* ── テーマ（既存サイトと共通キー） ── */
function toggleTheme() {
    const isDark = document.body.classList.toggle('dark-mode');
    document.documentElement.classList.toggle('dark-mode', isDark);
    localStorage.setItem('ozi-theme', isDark ? 'dark' : 'light');
}
(function(){ if (localStorage.getItem('ozi-theme')==='dark') document.body.classList.add('dark-mode'); })();

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ── カテゴリボタン生成 ── */
function buildCats() {
    const g = document.getElementById('cat-grid');
    g.innerHTML = '';
    CATEGORIES.forEach(c => {
        const b = document.createElement('button');
        b.className = 'cat-btn';
        b.innerHTML = `<span class="cat-emoji">${c.emoji}</span>${c.name}`;
        b.onclick = () => openLog(c.name, b);
        g.appendChild(b);
    });
    const p = document.getElementById('amt-presets');
    AMT_PRESETS.forEach(a => {
        const b = document.createElement('button');
        b.className = 'amt-preset';
        b.textContent = yen(a);
        b.onclick = () => { setAmt(a); };
        p.appendChild(b);
    });
}

function openLog(cat, btn) {
    sel = { cat, need:true, amt:null };
    document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('lp-cat').textContent = cat;
    document.getElementById('amt-input').value = '';
    document.getElementById('memo-input').value = '';
    document.querySelectorAll('.amt-preset').forEach(x=>x.classList.remove('active'));
    setNeed(true);
    document.getElementById('log-panel').classList.add('open');
    document.getElementById('amt-input').focus();
    document.getElementById('log-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}
function closeLog() {
    document.getElementById('log-panel').classList.remove('open');
    document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
    sel = { cat:null, need:true, amt:null };
}
function setAmt(a) {
    document.getElementById('amt-input').value = a;
    document.querySelectorAll('.amt-preset').forEach(x=>{
        x.classList.toggle('active', Number(x.textContent.replace(/[^0-9]/g,''))===a);
    });
}
function setNeed(isWaste) {
    sel.need = !isWaste;
    document.getElementById('need-btn').classList.toggle('sel-need', !isWaste);
    document.getElementById('waste-btn').classList.toggle('sel-waste', isWaste);
    document.getElementById('need-hint').textContent = isWaste
        ? "「ムダ」に入れた分だけが上の合計に積み上がる。記録する前に一呼吸、本当に必要だったか自分に聞いてみて。"
        : "必要だった出費として記録する（浪費の合計には乗らない）。";
}
function saveLog() {
    const amt = Math.round(Number(document.getElementById('amt-input').value));
    if (!sel.cat) { showToast("カテゴリを選んで"); return; }
    if (!amt || amt <= 0) { showToast("金額を入れて"); document.getElementById('amt-input').focus(); return; }
    LOG.push({
        id: Date.now(),
        amount: amt,
        category: sel.cat,
        memo: document.getElementById('memo-input').value.trim(),
        waste: !sel.need,
        ts: new Date().toISOString(),
    });
    save();
    closeLog();
    viewYM = null;      // 今月に戻す
    render();
    showToast(sel.need ? "記録した（必要な出費）" : `ムダ ${yen(amt)} を記録`);
}

function deleteLog(id) {
    const it = LOG.find(x=>x.id===id);
    if (!it) return;
    if (!confirm(`削除する？\n${it.category} ${yen(it.amount)} ${it.memo||''}`)) return;
    LOG = LOG.filter(x=>x.id!==id);
    save(); render();
    showToast("削除した");
}

/* ── 集計・描画 ── */
function currentViewYM() {
    if (viewYM) return viewYM;
    const n = new Date();
    return { y:n.getFullYear(), m:n.getMonth() };
}

function render() {
    renderHero();
    renderConversions();
    renderCatBars();
    renderChart();
    renderList();
}

function renderHero() {
    const now = new Date();
    const thisYM = { y:now.getFullYear(), m:now.getMonth() };
    const monthWaste = LOG.filter(x=>x.waste && sameYM(x.ts, thisYM))
                          .reduce((s,x)=>s+x.amount, 0);
    document.getElementById('hero-total').textContent = yen(monthWaste);
    document.getElementById('hero-month').textContent =
        now.toLocaleDateString('ja-JP', { year:'numeric', month:'long' });

    // 色: 額が増えるほど濃く（＝重く）
    const el = document.getElementById('hero-total');
    el.style.color = 'var(--red)';
    el.style.opacity = monthWaste === 0 ? '0.4' : '1';

    // 年間換算：今日までの日割りペースを12ヶ月換算
    const dayOfMonth = now.getDate();
    const dailyPace = monthWaste / dayOfMonth;
    const annual = dailyPace * 365;
    document.getElementById('pace-val').textContent = yen(annual);

    // ムダゼロ連続日数
    document.getElementById('hero-streak').innerHTML =
        `ムダ遣いゼロが <b>${zeroStreak()}</b> 日連続`;
}

function zeroStreak() {
    // 今日から遡って、その日に waste 記録が無い日を数える
    const wasteDays = new Set(
        LOG.filter(x=>x.waste).map(x=>new Date(x.ts).toDateString())
    );
    let streak = 0;
    const d = new Date();
    // 今日ムダがあれば0
    for (let i=0; i<400; i++) {
        const key = d.toDateString();
        if (wasteDays.has(key)) break;
        streak++;
        d.setDate(d.getDate()-1);
    }
    return streak;
}

function renderConversions() {
    const now = new Date();
    const thisYM = { y:now.getFullYear(), m:now.getMonth() };
    const total = LOG.filter(x=>x.waste && sameYM(x.ts, thisYM)).reduce((s,x)=>s+x.amount,0);
    const box = document.getElementById('conv-list');
    document.getElementById('conv-sub').textContent = yen(total) + ' / 今月';
    if (total <= 0) {
        box.innerHTML = '<div class="conv-empty">まだムダ遣いの記録なし。いい調子。</div>';
        return;
    }
    box.innerHTML = '';
    CONVERSIONS.forEach(c => {
        const n = Math.floor(total / c.unit);
        if (n < 1) return;
        const row = document.createElement('div');
        row.className = 'conv-item';
        row.innerHTML =
            `<span class="conv-emoji">${c.emoji}</span>` +
            `<span class="conv-num">${n}</span>` +
            `<span class="conv-txt">${c.name}が ${n}${c.label} 買えた</span>`;
        box.appendChild(row);
    });
    if (!box.children.length) {
        box.innerHTML = '<div class="conv-empty">まだ換算するほどじゃない。この調子で。</div>';
    }
}

function renderCatBars() {
    const now = new Date();
    const thisYM = { y:now.getFullYear(), m:now.getMonth() };
    const sums = {};
    LOG.filter(x=>x.waste && sameYM(x.ts, thisYM)).forEach(x=>{
        sums[x.category] = (sums[x.category]||0) + x.amount;
    });
    const arr = Object.entries(sums).sort((a,b)=>b[1]-a[1]);
    const box = document.getElementById('cat-bars');
    if (!arr.length) { box.innerHTML = '<div class="bars-empty">今月のムダ記録なし。</div>'; return; }
    const max = arr[0][1];
    box.innerHTML = '';
    arr.forEach(([name, val]) => {
        const row = document.createElement('div');
        row.className = 'cat-bar-row';
        row.innerHTML =
            `<div class="cat-bar-top"><span class="cat-bar-name">${name}</span>` +
            `<span class="cat-bar-val">${yen(val)}</span></div>` +
            `<div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(val/max*100)}%"></div></div>`;
        box.appendChild(row);
    });
}

function renderChart() {
    const box = document.getElementById('chart');
    const days = 14;
    const buckets = [];
    for (let i=days-1; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        buckets.push({ key:d.toDateString(), label:d.getDate(), sum:0 });
    }
    const idx = {}; buckets.forEach((b,i)=>idx[b.key]=i);
    LOG.filter(x=>x.waste).forEach(x=>{
        const k = new Date(x.ts).toDateString();
        if (k in idx) buckets[idx[k]].sum += x.amount;
    });
    const max = Math.max(1, ...buckets.map(b=>b.sum));
    box.innerHTML = '';
    buckets.forEach(b => {
        const col = document.createElement('div');
        col.className = 'chart-col';
        const h = b.sum > 0 ? Math.max(4, b.sum/max*100) : 2;
        col.innerHTML =
            `<div class="chart-bar${b.sum===0?' zero':''}" style="height:${h}%" title="${yen(b.sum)}"></div>` +
            `<span class="chart-day">${b.label}</span>`;
        box.appendChild(col);
    });
}

function shiftMonth(dir) {
    const cur = currentViewYM();
    let m = cur.m + dir, y = cur.y;
    if (m < 0) { m = 11; y--; }
    if (m > 11) { m = 0; y++; }
    viewYM = { y, m };
    renderList();
}

function renderList() {
    const ym = currentViewYM();
    const now = new Date();
    const isThisMonth = ym.y===now.getFullYear() && ym.m===now.getMonth();
    document.getElementById('mn-next').disabled = isThisMonth;
    document.getElementById('mn-label').textContent =
        new Date(ym.y, ym.m, 1).toLocaleDateString('ja-JP', { year:'numeric', month:'long' });

    const items = LOG.filter(x=>sameYM(x.ts, ym)).sort((a,b)=>b.id-a.id);
    const wasteSum = items.filter(x=>x.waste).reduce((s,x)=>s+x.amount,0);
    const allSum = items.reduce((s,x)=>s+x.amount,0);
    document.getElementById('list-cnt').textContent =
        `ムダ ${yen(wasteSum)} / 全 ${yen(allSum)}`;

    const box = document.getElementById('log-list');
    if (!items.length) { box.innerHTML = '<div class="list-empty">この月の記録はまだない。</div>'; return; }
    box.innerHTML = '';
    items.forEach(x => {
        const t = new Date(x.ts);
        const dstr = t.toLocaleDateString('ja-JP', {month:'2-digit', day:'2-digit'}) + ' ' +
                     t.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const row = document.createElement('div');
        row.className = 'log-item';
        row.innerHTML =
            `<span class="log-item-cat${x.waste?' waste':''}">${x.category}</span>` +
            `<div class="log-item-main">` +
                `<div class="log-item-memo">${x.memo ? escapeHtml(x.memo) : (x.waste?'（ムダ遣い）':'（必要な出費）')}</div>` +
                `<div class="log-item-date">${dstr}${x.waste?' · WASTE':''}</div>` +
            `</div>` +
            `<span class="log-item-amt${x.waste?' waste':''}">${yen(x.amount)}</span>` +
            `<button class="log-item-del" onclick="deleteLog(${x.id})">✕</button>`;
        box.appendChild(row);
    });
}

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ── EXPORT / IMPORT（バックアップ） ── */
function exportData() {
    const blob = new Blob([JSON.stringify(LOG, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `saifu-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast("バックアップを書き出した");
}
function importData() { document.getElementById('import-file').click(); }
document.getElementById('import-file').addEventListener('change', function(e){
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
        try {
            const data = JSON.parse(r.result);
            if (!Array.isArray(data)) throw new Error();
            if (!confirm(`${data.length}件を読み込む？（今のデータは置き換わる）`)) return;
            LOG = data; save(); viewYM=null; render();
            showToast("読み込んだ");
        } catch(err) { showToast("読み込めなかった（JSON壊れてる？）"); }
        e.target.value = '';
    };
    r.readAsText(f);
});

/* ── 金額入力Enterで保存 ── */
document.addEventListener('keydown', e => {
    if (e.key==='Enter' && document.getElementById('log-panel').classList.contains('open')) {
        if (e.target.classList.contains('amt-input') || e.target.classList.contains('memo-input')) saveLog();
    }
});

/* ── INIT ── */
document.getElementById('brand').innerHTML = `<em>${APP_NAME}</em> — LEDGER`;
document.title = `${APP_NAME} — LEDGER`;
document.getElementById('today-str').textContent =
    new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
load();
buildCats();
render();
</script>
